<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="google-adsense-account" content="ca-pub-6404002530597562">
  <title>notwebscale</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #e2e8f0;
      padding: 60px 20px 80px;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    /* ── Hero ── */
    .hero {
      text-align: center;
      margin-bottom: 56px;
    }

    .hero__eyebrow {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: rgba(255, 255, 255, 0.35);
      margin-bottom: 20px;
    }

    .hero__title {
      font-size: 2.4rem;
      font-weight: 800;
      line-height: 1.15;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
    }

    .hero__subtitle {
      font-size: 1rem;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.5);
      line-height: 1.6;
    }

    /* ── Tools Grid ── */
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 64px;
    }

    /* ── Card ── */
    .card {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: border-color 0.2s, background 0.2s;
    }

    .card:hover {
      background: rgba(255, 255, 255, 0.09);
      border-color: rgba(255, 255, 255, 0.18);
    }

    .card__icon {
      font-size: 2rem;
      line-height: 1;
    }

    .card__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .card__name {
      font-size: 1.15rem;
      font-weight: 700;
      color: #e2e8f0;
    }

    .card__description {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.5);
      line-height: 1.65;
      flex: 1;
    }

    .card__footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: auto;
    }

    /* ── Pill ── */
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
    }

    .pill--purple {
      background: rgba(167, 139, 250, 0.15);
      color: #c4b5fd;
      border: 1px solid rgba(167, 139, 250, 0.25);
    }

    .pill--blue {
      background: rgba(96, 165, 250, 0.15);
      color: #93c5fd;
      border: 1px solid rgba(96, 165, 250, 0.25);
    }

    .pill--green {
      background: rgba(52, 211, 153, 0.12);
      color: #6ee7b7;
      border: 1px solid rgba(52, 211, 153, 0.22);
    }

    /* ── Button ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.2s, transform 0.15s;
    }

    .btn--primary {
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      color: #fff;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      padding: 11px 22px;
    }

    .btn--primary:hover {
      opacity: 0.88;
      transform: translateY(-1px);
    }

    .btn--primary:active {
      transform: translateY(0);
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.06);
      margin: 0 0 12px;
    }

    /* ── Footer ── */
    .footer {
      text-align: center;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.35);
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .hero__title {
        font-size: 2rem;
      }

      .card {
        padding: 24px;
      }

      .card__footer {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- Hero -->
    <header class="hero">
      <p class="hero__eyebrow">tools for humans</p>
      <h1 class="hero__title">notwebscale</h1>
      <p class="hero__subtitle">Small, focused tools for a cleaner, faster, more effective web.</p>
    </header>

    <!-- Tools -->
    <main>
      <div class="tools-grid">

        <!-- Clean Link -->
        <div class="card">
          <div class="card__icon">🔗</div>
          <div>
            <div class="card__header">
              <span class="card__name">Clean Link</span>
            </div>
          </div>
          <p class="card__description">
            Strip tracking parameters, follow redirects, and get the real destination URL — instantly.
          </p>
          <div class="divider"></div>
          <div class="card__footer">
            <span class="pill pill--purple">Privacy</span>
            <a class="btn btn--primary" href="https://cleanlink.notwebscale.com" target="_blank" rel="noopener">
              Open
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                <polyline points="15 3 21 3 21 9"/>
                <line x1="10" y1="14" x2="21" y2="3"/>
              </svg>
            </a>
          </div>
        </div>

      </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
      &copy; 2026 notwebscale
    </footer>

  </div>
</body>
</html>
